<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siscar — Login</title>
  <meta name="description" content="Acesse o painel do Siscar para gerenciar sua loja de veículos.">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-grid"></div>

  <div class="login-card">
    <a href="../index.html" class="login-logo">
      <div class="logo-icon">🚗</div>
      <span>Sis<span style="color:var(--primary)">car</span></span>
    </a>

    <h2 class="login-title">Seja bem-vindo de volta!</h2>
    <p class="login-subtitle">Acesse sua conta para gerenciar seu estoque e vendas.</p>

    <form class="login-form" id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-email">E-mail</label>
        <div class="form-input-wrap">
          <span class="form-input-icon">📧</span>
          <input type="email" id="login-email" class="form-input" placeholder="seuemail@exemplo.com" required value="admin@siscar.com">
        </div>
      </div>

      <div class="form-group">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2px;">
          <label class="form-label" for="login-password" style="margin-bottom:0;">Senha</label>
          <span class="login-forgot" id="forgot-password">Esqueceu a senha?</span>
        </div>
        <div class="form-input-wrap">
          <span class="form-input-icon">🔒</span>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required value="123456">
          <span class="form-input-icon" id="toggle-password" style="cursor:pointer;right:0;left:auto;padding-right:12px;" onclick="togglePasswordVisibility()">👁</span>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <input type="checkbox" id="remember-me" style="width:16px;height:16px;cursor:pointer;">
        <label for="remember-me" style="font-size:0.85rem;color:var(--text-secondary);cursor:pointer;">Lembrar-me por 30 dias</label>
      </div>

      <div id="login-error" style="display:none;padding:10px 14px;background:rgba(226,36,70,0.1);border:1px solid rgba(226,36,70,0.3);border-radius:8px;color:#E22446;font-size:0.85rem;margin-bottom:12px;">
        ❌ <span id="login-error-msg">Usuário ou senha inválidos.</span>
      </div>

      <button type="submit" class="btn btn-primary w-full" id="btn-login" style="justify-content:center; margin-top:8px;">
        <span id="login-btn-text">Entrar no Painel 🚀</span>
      </button>
    </form>

    <div style="margin-top: 24px;">
      <div class="login-divider">ou acesse como demonstração</div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px;">
        <button class="btn btn-secondary btn-sm" style="justify-content:center;" onclick="quickLogin('carlos@siscar.com')">🔑 Vendedor</button>
        <button class="btn btn-secondary btn-sm" style="justify-content:center;" onclick="quickLogin('joao@siscar.com')">🔑 Gerente</button>
      </div>
    </div>

    <p class="login-register">
      Ainda não tem conta? <a href="../index.html#contato">Teste grátis por 15 dias</a>
    </p>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/db.js"></script>
<script>
  // Se já tem sessão, redireciona
  window.addEventListener('siscar-db-ready', async () => {
    const session = Auth.getSession();
    if (session) {
      window.location.href = 'dashboard.html';
      return;
    }
  });

  document.getElementById('login-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email')?.value?.trim()?.toLowerCase();
    const password = document.getElementById('login-password')?.value;
    const btn = document.getElementById('btn-login');
    const btnText = document.getElementById('login-btn-text');
    const errorEl = document.getElementById('login-error');
    const errorMsg = document.getElementById('login-error-msg');

    btn.disabled = true;
    btnText.textContent = 'Entrando...';
    errorEl.style.display = 'none';

    // Wait for DB
    const tryLogin = async () => {
      const user = await SiscarDB.loginUser(email, password);
      if (user) {
        Auth.setSession(user);
        // Legacy support
        localStorage.setItem('siscar_current_user', JSON.stringify({ name: user.name, email: user.email, role: user.role }));
        Toast.success('Login realizado!', `Bem-vindo, ${user.name}! 🎉`);
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
      } else {
        btn.disabled = false;
        btnText.textContent = 'Entrar no Painel 🚀';
        errorEl.style.display = 'block';
        errorMsg.textContent = 'E-mail ou senha inválidos. Verifique e tente novamente.';
      }
    };

    if (window.SiscarDB) {
      await tryLogin();
    } else {
      window.addEventListener('siscar-db-ready', tryLogin, { once: true });
    }
  });

  function quickLogin(email) {
    const emailInput = document.getElementById('login-email');
    const passInput = document.getElementById('login-password');
    if (emailInput && passInput) {
      emailInput.value = email;
      passInput.value = '123456';
      document.getElementById('login-form').dispatchEvent(new Event('submit'));
    }
  }

  function togglePasswordVisibility() {
    const passInput = document.getElementById('login-password');
    passInput.type = passInput.type === 'password' ? 'text' : 'password';
  }

  document.getElementById('forgot-password')?.addEventListener('click', () => {
    Toast.info('Recuperação de Senha', 'Entre em contato: contato@siscar.com.br ou (11) 99999-9999');
  });
</script>
</body>
</html>
