<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siscar — Gestão de Estoque</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/extras.css">
</head>
<body data-page="estoque">

<div class="app-layout">
  <aside class="sidebar"></aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle">☰</button>
        <div class="breadcrumb"><a href="dashboard.html">Admin</a> / <span>Estoque</span></div>
      </div>
      <div class="topbar-right">
        <button class="topbar-icon-btn" title="Notificações">🔔<span class="notif-badge"></span></button>
      </div>
    </header>

    <div class="page-content">
      <header class="page-header">
        <div class="page-header-left">
          <h1>Gestão de Estoque</h1>
          <p>Gerencie todos os veículos cadastrados na sua loja.</p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-primary" id="btn-add-vehicle">➕ Cadastrar Veículo</button>
        </div>
      </header>

      <!-- Stock Counts -->
      <div class="stock-counts">
        <div class="stock-count-chip"><span class="chip-num chip-disponivel" id="stock-disponivel">-</span> Disponíveis</div>
        <div class="stock-count-chip"><span class="chip-num chip-reservado" id="stock-reservado">-</span> Reservados</div>
        <div class="stock-count-chip"><span class="chip-num chip-vendido" id="stock-vendido">-</span> Vendidos</div>
        <div class="stock-count-chip"><span class="chip-num" id="stock-total">-</span> Total</div>
      </div>

      <!-- Toolbar -->
      <div class="page-toolbar">
        <div class="toolbar-left">
          <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="vehicle-search" class="form-input" placeholder="Buscar por marca, modelo, placa, cor...">
          </div>
          <div class="chart-filters" style="margin-left: 10px;">
            <button class="chart-filter-btn status-filter-btn active" data-status="all">Todos</button>
            <button class="chart-filter-btn status-filter-btn" data-status="disponivel">Disponíveis</button>
            <button class="chart-filter-btn status-filter-btn" data-status="reservado">Reservados</button>
            <button class="chart-filter-btn status-filter-btn" data-status="vendido">Vendidos</button>
          </div>
        </div>
        <div class="toolbar-right">
          <button class="btn btn-secondary btn-icon view-btn active" data-view="grid" title="Grade">📱</button>
          <button class="btn btn-secondary btn-icon view-btn" data-view="list" title="Tabela">📑</button>
        </div>
      </div>

      <!-- Vehicles Container -->
      <div id="vehicles-container" class="vehicles-grid">
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-state-icon">🚗</div>
          <h3>Carregando estoque...</h3>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal: Cadastrar/Editar Veículo -->
<div class="modal-overlay" id="modal-vehicle">
  <div class="modal" style="max-width:640px;">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-vehicle-title">Cadastrar Veículo</h3>
      <button class="modal-close" onclick="Modal.close('modal-vehicle')">✕</button>
    </div>
    <div class="modal-body">
      <form id="form-vehicle" class="login-form">
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label" for="v-brand">Marca *</label>
            <input type="text" id="v-brand" class="form-input" placeholder="Ex: Toyota" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="v-model">Modelo *</label>
            <input type="text" id="v-model" class="form-input" placeholder="Ex: Corolla" required>
          </div>
        </div>

        <div class="form-grid-3">
          <div class="form-group">
            <label class="form-label" for="v-year">Ano</label>
            <input type="number" id="v-year" class="form-input" placeholder="Ex: 2022" value="2022" min="1950" max="2030">
          </div>
          <div class="form-group">
            <label class="form-label" for="v-color">Cor</label>
            <input type="text" id="v-color" class="form-input" placeholder="Ex: Prata">
          </div>
          <div class="form-group">
            <label class="form-label" for="v-plate">Placa</label>
            <input type="text" id="v-plate" class="form-input" placeholder="Ex: AAA-1234" style="text-transform:uppercase;">
          </div>
        </div>

        <div class="form-grid-3">
          <div class="form-group">
            <label class="form-label" for="v-km">Quilometragem</label>
            <input type="number" id="v-km" class="form-input" placeholder="Ex: 32000" value="0" min="0">
          </div>
          <div class="form-group">
            <label class="form-label" for="v-category">Categoria</label>
            <select id="v-category" class="form-select">
              <option value="Sedan">Sedan</option>
              <option value="SUV">SUV</option>
              <option value="Hatch">Hatch</option>
              <option value="Pickup">Pickup</option>
              <option value="Van">Van</option>
              <option value="Moto">Moto</option>
              <option value="Caminhão">Caminhão</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="v-fuel">Combustível</label>
            <select id="v-fuel" class="form-select">
              <option value="Flex">Flex</option>
              <option value="Gasolina">Gasolina</option>
              <option value="Diesel">Diesel</option>
              <option value="Híbrido">Híbrido</option>
              <option value="Elétrico">Elétrico</option>
            </select>
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label" for="v-purchase">Preço de Compra (R$)</label>
            <input type="number" id="v-purchase" class="form-input" placeholder="Ex: 85000" min="0" step="100">
          </div>
          <div class="form-group">
            <label class="form-label" for="v-sale">Preço de Venda (R$)</label>
            <input type="number" id="v-sale" class="form-input" placeholder="Ex: 99900" min="0" step="100">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="v-status">Status</label>
          <select id="v-status" class="form-select">
            <option value="disponivel">Disponível</option>
            <option value="reservado">Reservado</option>
            <option value="vendido">Vendido</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="v-notes">Observações</label>
          <textarea id="v-notes" class="form-input" rows="2" placeholder="Ex: Veículo em excelente estado, único dono..." style="resize:vertical;"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Fotos do Veículo</label>
          <div class="photo-upload">
            <input type="file" id="v-photos" accept="image/*" multiple>
            <div class="photo-upload-icon">📷</div>
            <h4>Fotos do Veículo</h4>
            <p>Clique para selecionar (múltiplas fotos)</p>
          </div>
          <div id="photo-preview" class="photo-preview-grid"></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modal-vehicle')">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-vehicle">Salvar Veículo</button>
    </div>
  </div>
</div>

<!-- Modal: Detalhe do Veículo -->
<div class="modal-overlay" id="modal-vehicle-detail">
  <div class="modal" style="max-width:680px;">
    <div class="modal-header">
      <h3 class="modal-title">Detalhe do Veículo</h3>
      <button class="modal-close" onclick="Modal.close('modal-vehicle-detail')">✕</button>
    </div>
    <div class="modal-body" id="vehicle-detail-content">
      <!-- Rendered by JS -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modal-vehicle-detail')">Fechar</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/db.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
